spring.application.name=dashboard

# ================= SERVER =================
server.address=0.0.0.0
server.port=${PORT:8080}

# ================= DATABASE =================
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ================= JPA =================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

# ================= FILE =================
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=10MB

# ================= CLOUDINARY =================
cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME}
cloudinary.api-key=${CLOUDINARY_API_KEY}
cloudinary.api-secret=${CLOUDINARY_API_SECRET}

# ================= FILE RULES =================
file.allowed-types=image/jpeg,image/png,image/jpg,application/pdf
file.max-size=5242880

# ================= STATIC =================
spring.web.resources.add-mappings=true
spring.web.resources.static-locations=classpath:/static/

# ================= JSON =================
spring.jackson.default-property-inclusion=NON_NULL
spring.jackson.deserialization.fail-on-unknown-properties=false

# ================= ERROR =================
server.error.include-message=always
server.error.include-binding-errors=always
server.error.include-stacktrace=always
server.error.include-exception=true

logging.level.org.springframework.web=DEBUG

# ================= MAIL =================
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=ourhr.futureinvosolutions@gmail.com
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# ================= FRONTEND =================
app.frontend.url=${APP_FRONTEND_URL}

# ================= EMPLOYEE =================
employee.code.delay.type=MINUTES
employee.code.delay.value=1

# ================= ACTUATOR (HEALTH CHECK) =================
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=always
spring.application.name=dashboard

# ================= SERVER =================
server.address=0.0.0.0
server.port=8090

# ================= DATABASE =================
spring.datasource.url=jdbc:mysql://localhost:3306/dashboard_copy
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ================= JPA =================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

# ================= FILE UPLOAD =================
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=10MB

# Upload directory used by controller
onboarding.upload.dir=C:/onboard/uploads

# Allowed file types
file.allowed-types=image/jpeg,image/png,image/jpg,application/pdf

# Max file size
file.max-size=5242880

spring.web.resources.add-mappings=true
spring.web.resources.static-locations=classpath:/static/

# Base URL for accessing files
app.file.base-url=http://localhost:8090/api/onboarding/files

# ================= JSON =================
spring.jackson.default-property-inclusion=NON_NULL
spring.jackson.deserialization.fail-on-unknown-properties=false

# ================= ERROR DEBUG =================
server.error.include-message=always
server.error.include-binding-errors=always
server.error.include-stacktrace=always
server.error.include-exception=true

logging.level.org.springframework.web=DEBUG

# ================= MAIL =================
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=ourhr.futureinvosolutions@gmail.com
spring.mail.password=vwemieagotfvqxsj
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# ================= FRONTEND =================
app.frontend.url=http://192.168.3.118:5173

